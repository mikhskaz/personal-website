# DigitalOcean App Platform — static site spec for Crisis & Canopy
#
# Two ways to use it:
#   A) UI:  Create App -> connect GitHub repo -> the settings below map 1:1 to
#           the form (Resource = Static Site, Source Dir, Build Command, Output Dir).
#   B) CLI: edit the `repo:` line, then `doctl apps create --spec .do/app.yaml`
#
# The app is 100% static (no backend). It fetches the pre-built JSON/GeoJSON in
# toronto-app/public/data/ at runtime, which is committed to the repo.

name: crisis-and-canopy
region: tor1   # Toronto datacentre — fitting for a Toronto map (any region works)

static_sites:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/YOUR_REPO   # <-- EDIT to owner/repo
      branch: main
      deploy_on_push: true                   # auto-redeploy on every push
    source_dir: /toronto-app                 # the Vite app lives in this subfolder
    build_command: npm ci && npm run build   # uses package-lock for reproducible builds
    output_dir: dist                         # Vite build output (relative to source_dir)
    index_document: index.html
    catchall_document: index.html            # single-page app: serve index for any path
